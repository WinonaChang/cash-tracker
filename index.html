<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接案現金水位追蹤器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg:#f9f9f9;--card:#ffffff;--border:#e2e2e2;
    --text:#1a1a1a;--text2:#6b7280;--blue:#185FA5;--brown:#854F0B;--green:#3B6D11;
    --radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
  .container{max-width:680px;margin:0 auto;padding:1.5rem 1rem 3rem}
  h1{font-size:18px;font-weight:600;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
  .tabs{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem}
  .tab{flex:1;padding:9px 0;font-size:13px;text-align:center;cursor:pointer;background:var(--card);color:var(--text2);border:none;font-family:var(--font);transition:background .15s}
  .tab.active{background:#E6F1FB;color:var(--blue);font-weight:500}
  .tab:not(:last-child){border-right:1px solid var(--border)}
  .sec{font-size:13px;font-weight:500;color:var(--text2);margin:1.1rem 0 7px;display:flex;align-items:center;gap:5px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px}
  .card-blue{background:var(--card);border:1.5px solid #85B7EB;border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px}
  .row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .row:last-child{margin-bottom:0}
  .editable{font-size:13px;color:var(--text2);width:64px;min-width:40px;max-width:72px;outline:none;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;flex-shrink:0}

  /* Number input — large & bold */
  input[type=number]{
    flex:1;min-width:0;border:1px solid var(--border);border-radius:8px;
    padding:5px 8px;font-size:16px;font-weight:700;color:var(--text);
    background:#fff;font-family:var(--font);text-align:right;
  }
  input[type=number]:focus{outline:none;border-color:#93C5FD}
  input[type=text]{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;background:var(--bg);color:var(--text);font-family:var(--font);flex:1}
  input[type=text]:focus{outline:none;border-color:#93C5FD}

  /* Tag select — very narrow */
  .tag-select{
    font-size:10px;padding:2px 3px;border-radius:999px;border:none;
    cursor:pointer;font-family:var(--font);appearance:none;-webkit-appearance:none;
    text-align:center;font-weight:600;outline:none;
    width:38px;flex-shrink:0;overflow:hidden;
  }

  .del-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:15px;padding:0 2px;line-height:1;flex-shrink:0}
  .add-btn{font-size:13px;color:var(--text2);cursor:pointer;border:1px dashed var(--border);border-radius:8px;padding:6px 12px;width:100%;text-align:center;margin-top:8px;background:transparent;font-family:var(--font)}
  .add-btn:hover{background:var(--bg)}
  .row-label{font-size:13px;color:var(--text2);width:78px;min-width:78px;display:flex;align-items:center;gap:4px;flex-shrink:0}

  .accum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .accum-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem}
  .accum-card .al{font-size:12px;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
  .accum-card .av{font-size:20px;font-weight:600}
  .accum-card .ag{font-size:11px;margin-top:4px}
  .accum-card .hint{font-size:11px;color:var(--text2);margin-top:2px}

  .sum4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:1.1rem}
  .metric{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem}
  .metric .ml{font-size:11px;color:var(--text2);margin-bottom:3px}
  .metric .mv{font-size:15px;font-weight:500}

  .scene-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1rem;align-items:end}
  .scene-col{display:flex;flex-direction:column;align-items:center;gap:5px}
  .scene-col .slabel{font-size:12px;color:var(--text2);font-weight:500}
  .scene-col .sval{font-size:13px;font-weight:500}
  .scene-col .spct{font-size:11px;color:var(--text2)}
  canvas{display:block;border-radius:8px;max-width:100%}

  .pay-breakdown{margin-top:9px;border-top:1px solid var(--border);padding-top:7px}
  .brow{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:2px 0}
  .brow.total{font-weight:500;color:var(--text);font-size:13px;border-top:1px solid var(--border);margin-top:3px;padding-top:5px}

  .save-bar{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
  .primary-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-family:var(--font);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
  .primary-btn:hover{background:#0C447C}

  .hist-list{display:flex;flex-direction:column;gap:8px}
  .hist-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1.25rem}
  .hist-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:9px}
  .hist-num .hl{font-size:11px;color:var(--text2)}
  .hist-num .hv{font-size:13px;font-weight:500}
  .hist-actions{display:flex;gap:6px;margin-top:8px}
  .hist-actions button{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:4px}
  .hist-actions .del-act{color:#A32D2D}
  .empty-msg{text-align:center;padding:2.5rem;font-size:14px;color:var(--text2)}

  .status-bar{text-align:center;padding:9px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);font-size:13px;margin-bottom:1rem}
  .prev-hint{font-size:11px;color:var(--text2);margin-top:5px;padding:5px 8px;background:var(--bg);border-radius:6px;display:flex;justify-content:space-between}
  .inp-big{font-size:20px!important;font-weight:700!important;color:var(--blue)!important}

  .toast{position:fixed;top:16px;right:16px;background:#3B6D11;color:#EAF3DE;font-size:13px;padding:8px 16px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}

  @media(max-width:480px){
    .sum4{grid-template-columns:1fr 1fr}
    .scene-row{gap:6px}
    .save-bar{flex-direction:column}
    .save-bar input,.primary-btn{width:100%;justify-content:center}
  }
</style>
</head>
<body>
<div class="container">
<h1><i class="ti ti-plant" style="font-size:20px;color:#3B6D11"></i> 接案現金水位追蹤器</h1>

<div class="sec" style="margin-top:0"><i class="ti ti-trending-up" style="font-size:14px;color:#185FA5"></i> 累計資產總覽</div>
<div class="accum-grid">
  <div class="accum-card">
    <div class="al"><i class="ti ti-wallet" style="font-size:13px;color:#185FA5"></i> 累計現金存量</div>
    <div class="av" id="acc-cash" style="color:#185FA5">NT$0</div>
    <div class="ag" id="acc-cash-delta"></div>
    <div class="hint">手上現金 × 歷次累加</div>
  </div>
  <div class="accum-card">
    <div class="al"><i class="ti ti-piggy-bank" style="font-size:13px;color:#3B6D11"></i> 累計儲蓄</div>
    <div class="av" id="acc-save" style="color:#3B6D11">NT$0</div>
    <div class="ag" id="acc-save-delta"></div>
    <div class="hint">儲蓄 × 歷次累加</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('input')"><i class="ti ti-edit" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>記帳</button>
  <button class="tab" onclick="switchTab('history')"><i class="ti ti-history" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>歷史紀錄</button>
</div>

<div id="tab-input">
  <div class="sec" style="margin-top:0"><i class="ti ti-wallet" style="font-size:14px"></i> 本期手上現金</div>
  <div class="card-blue">
    <div class="row" style="margin-bottom:0">
      <div class="row-label" style="font-size:14px;font-weight:500;color:#185FA5;width:auto;min-width:auto"><i class="ti ti-currency-dollar" style="font-size:15px"></i> 現金存量</div>
      <input type="number" id="cash" class="inp-big" value="0" min="0" step="1000" oninput="calc()">
    </div>
    <div class="prev-hint"><span>上次紀錄現金</span><span id="prev-cash-val">尚無紀錄</span></div>
  </div>

  <div class="sec"><i class="ti ti-cash" style="font-size:14px"></i> 接案收入來源</div>
  <div class="card">
    <div id="income-list">
      <div class="row"><span contenteditable="true" class="editable">網頁設計</span><input type="number" value="30000" min="0" step="500" oninput="calc()"><select class="tag-select" onchange="styleTag(this)"><option>接案</option><option>外包</option><option>顧問</option><option>教學</option><option>其他</option></select><button onclick="removeRow(this,'income-list')" class="del-btn">&#x2715;</button></div>
      <div class="row"><span contenteditable="true" class="editable">App開發</span><input type="number" value="45000" min="0" step="500" oninput="calc()"><select class="tag-select" onchange="styleTag(this)"><option>接案</option><option>外包</option><option>顧問</option><option>教學</option><option>其他</option></select><button onclick="removeRow(this,'income-list')" class="del-btn">&#x2715;</button></div>
      <div class="row"><span contenteditable="true" class="editable">顧問諮詢</span><input type="number" value="15000" min="0" step="500" oninput="calc()"><select class="tag-select" onchange="styleTag(this)"><option>接案</option><option>外包</option><option selected>顧問</option><option>教學</option><option>其他</option></select><button onclick="removeRow(this,'income-list')" class="del-btn">&#x2715;</button></div>
    </div>
    <button class="add-btn" onclick="addIncome()"><i class="ti ti-plus" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>新增收入管道</button>
  </div>

  <div class="sec"><i class="ti ti-receipt" style="font-size:14px"></i> 代繳款細項</div>
  <div class="card">
    <div id="pay-list">
      <div class="row"><div class="row-label"><i class="ti ti-device-laptop" style="font-size:13px"></i><span contenteditable="true" class="editable" style="min-width:36px">軟體費</span></div><input type="number" value="3500" min="0" step="100" oninput="calc()"><select class="tag-select" onchange="styleTag(this)"><option selected>固定</option><option>偶爾</option><option>季付</option><option>年付</option><option>自訂</option></select><button class="del-btn" onclick="removeRow(this,'pay-list')">&#x2715;</button></div>
      <div class="row"><div class="row-label"><i class="ti ti-run" style="font-size:13px"></i><span contenteditable="true" class="editable" style="min-width:36px">運動費</span></div><input type="number" value="2000" min="0" step="100" oninput="calc()"><select class="tag-select" onchange="styleTag(this)"><option selected>固定</option><option>偶爾</option><option>季付</option><option>年付</option><option>自訂</option></select><button class="del-btn" onclick="removeRow(this,'pay-list')">&#x2715;</button></div>
      <div class="row"><div class="row-label"><i class="ti ti-heart" style="font-size:13px"></i><span contenteditable="true" class="editable" style="min-width:36px">情侶用餐</span></div><input type="number" value="4000" min="0" step="100" oninput="calc()"><select class="tag-select" onchange="styleTag(this)"><option>固定</option><option selected>偶爾</option><option>季付</option><option>年付</option><option>自訂</option></select><button class="del-btn" onclick="removeRow(this,'pay-list')">&#x2715;</button></div>
      <div class="row"><div class="row-label"><i class="ti ti-dots" style="font-size:13px"></i><span contenteditable="true" class="editable" style="min-width:36px">其他</span></div><input type="number" value="1500" min="0" step="100" oninput="calc()"><select class="tag-select" onchange="styleTag(this)"><option>固定</option><option>偶爾</option><option>季付</option><option>年付</option><option selected>自訂</option></select><button class="del-btn" onclick="removeRow(this,'pay-list')">&#x2715;</button></div>
    </div>
    <button class="add-btn" onclick="addPay()"><i class="ti ti-plus" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>新增代繳項目</button>
    <div class="pay-breakdown" id="pay-breakdown"></div>
  </div>

  <div class="sec"><i class="ti ti-plant" style="font-size:14px"></i> 本期儲蓄</div>
  <div class="card">
    <div class="row" style="margin-bottom:0">
      <div class="row-label"><i class="ti ti-piggy-bank" style="font-size:13px"></i><span>本期存入</span></div>
      <input type="number" id="saving" value="5000" min="0" step="500" oninput="calc()">
    </div>
    <div class="prev-hint"><span>上次紀錄儲蓄</span><span id="prev-save-val">尚無紀錄</span></div>
  </div>

  <div class="sum4">
    <div class="metric"><div class="ml">手上現金</div><div class="mv" id="m-cash" style="color:#185FA5">-</div></div>
    <div class="metric"><div class="ml">接案收入</div><div class="mv" id="m-income">-</div></div>
    <div class="metric"><div class="ml">代繳款</div><div class="mv" id="m-pay" style="color:#854F0B">-</div></div>
    <div class="metric"><div class="ml">可動現金</div><div class="mv" id="m-avail" style="color:#3B6D11">-</div></div>
  </div>

  <div class="scene-row">
    <div class="scene-col"><div class="slabel">可動現金</div><canvas id="cWater" width="160" height="175"></canvas><div class="sval" id="sv-avail" style="color:#185FA5">-</div><div class="spct" id="sp-avail">-</div></div>
    <div class="scene-col"><div class="slabel">代繳款</div><canvas id="cSoil" width="160" height="175"></canvas><div class="sval" id="sv-pay" style="color:#854F0B">-</div><div class="spct" id="sp-pay">-</div></div>
    <div class="scene-col"><div class="slabel">儲蓄</div><canvas id="cPlant" width="160" height="175"></canvas><div class="sval" id="sv-save" style="color:#3B6D11">-</div><div class="spct" id="sp-save">-</div></div>
  </div>

  <div class="status-bar" id="status-bar"></div>

  <div class="save-bar">
    <input type="text" id="snap-name" placeholder="紀錄名稱（例：2026年5月）">
    <button class="primary-btn" onclick="saveSnap()"><i class="ti ti-device-floppy" style="font-size:13px"></i>儲存並累加</button>
  </div>
</div>

<div id="tab-history" style="display:none">
  <div id="hist-content" class="hist-list"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
var waveT=0,incIdx=0,payIdx=0;
var incNames=['UI設計','後端開發','SEO顧問','文案撰寫','教學課程'];
var payNames=['交通費','訂閱費','保險費','電話費','房租'];
var payIcons=['ti-car','ti-brand-netflix','ti-shield','ti-device-mobile','ti-home'];
var tagColors={'接案':['#E6F1FB','#0C447C'],'外包':['#EDE9FE','#4C1D95'],'顧問':['#FEF3C7','#78350F'],'教學':['#DCFCE7','#14532D'],'其他':['#F3F4F6','#374151'],'固定':['#FAEEDA','#633806'],'偶爾':['#FEE2E2','#7F1D1D'],'季付':['#E0F2FE','#0C4A6E'],'年付':['#F0FDF4','#14532D'],'自訂':['#F5F3FF','#4C1D95']};
function fmt(n){return 'NT$'+Math.round(n).toLocaleString('zh-TW')}
function fmtDelta(n){if(n===0)return '';var s=n>0?'↑ +':'↓ ';return '<span style="color:'+(n>0?'#3B6D11':'#A32D2D')+'">'+s+Math.abs(Math.round(n)).toLocaleString('zh-TW')+'</span>';}
function styleTag(s){var c=tagColors[s.value]||['#F3F4F6','#374151'];s.style.background=c[0];s.style.color=c[1];}
function makeTagSelect(opts,sel){var s=document.createElement('select');s.className='tag-select';s.setAttribute('onchange','styleTag(this)');opts.forEach(function(o){var op=document.createElement('option');op.value=op.textContent=o;if(o===sel)op.selected=true;s.appendChild(op);});styleTag(s);return s;}
function switchTab(t){document.getElementById('tab-input').style.display=t==='input'?'block':'none';document.getElementById('tab-history').style.display=t==='history'?'block':'none';document.querySelectorAll('.tab').forEach(function(b,i){b.classList.toggle('active',(t==='input'&&i===0)||(t==='history'&&i===1));});if(t==='history')renderHistory();}
function getIncome(){var s=0;document.querySelectorAll('#income-list .row input[type=number]').forEach(function(i){s+=Math.max(0,parseFloat(i.value)||0)});return s;}
function getPayable(){var s=0;document.querySelectorAll('#pay-list .row input[type=number]').forEach(function(i){s+=Math.max(0,parseFloat(i.value)||0)});return s;}
function getAccum(){try{return JSON.parse(localStorage.getItem('cashAccum')||'{"totalCash":0,"totalSave":0}');}catch(e){return {totalCash:0,totalSave:0};}}
function saveAccum(a){try{localStorage.setItem('cashAccum',JSON.stringify(a));}catch(e){}}
function getHistory(){try{return JSON.parse(localStorage.getItem('cashHistory')||'[]');}catch(e){return [];}}
function saveHistory(arr){try{localStorage.setItem('cashHistory',JSON.stringify(arr));}catch(e){}}
function updateAccumUI(){var a=getAccum();document.getElementById('acc-cash').textContent=fmt(a.totalCash);document.getElementById('acc-save').textContent=fmt(a.totalSave);var hist=getHistory();if(hist.length>=2){var cur=hist[0],prev=hist[1];document.getElementById('acc-cash-delta').innerHTML='較上期 '+fmtDelta(cur.cash-prev.cash);document.getElementById('acc-save-delta').innerHTML='較上期 '+fmtDelta(cur.saving-(prev.saving||0));}else if(hist.length===1){document.getElementById('acc-cash-delta').innerHTML='<span style="color:#6b7280">第一筆紀錄</span>';document.getElementById('acc-save-delta').innerHTML='<span style="color:#6b7280">第一筆紀錄</span>';}if(hist.length>0){var last=hist[0];document.getElementById('prev-cash-val').textContent=fmt(last.cash||0)+' ('+last.date+')';document.getElementById('prev-save-val').textContent=fmt(last.saving||0)+' ('+last.date+')';}}
function removeRow(btn,listId){var list=document.getElementById(listId);if(list.querySelectorAll('.row').length>1){btn.closest('.row').remove();calc();}}
function addIncome(){var div=document.createElement('div');div.className='row';var sp=document.createElement('span');sp.contentEditable=true;sp.className='editable';sp.textContent=incNames[incIdx%incNames.length];var inp=document.createElement('input');inp.type='number';inp.value=10000;inp.min=0;inp.step=500;inp.oninput=calc;var sel=makeTagSelect(['接案','外包','顧問','教學','其他'],'接案');var btn=document.createElement('button');btn.className='del-btn';btn.innerHTML='&#x2715;';btn.onclick=function(){removeRow(this,'income-list')};div.appendChild(sp);div.appendChild(inp);div.appendChild(sel);div.appendChild(btn);document.getElementById('income-list').appendChild(div);incIdx++;calc();}
function addPay(){var icon=payIcons[payIdx%payIcons.length],name=payNames[payIdx%payNames.length];var div=document.createElement('div');div.className='row';var ld=document.createElement('div');ld.className='row-label';ld.innerHTML='<i class="ti '+icon+'" style="font-size:13px"></i>';var sp=document.createElement('span');sp.contentEditable=true;sp.className='editable';sp.style.minWidth='36px';sp.textContent=name;ld.appendChild(sp);div.appendChild(ld);var inp=document.createElement('input');inp.type='number';inp.value=1000;inp.min=0;inp.step=100;inp.oninput=calc;div.appendChild(inp);var sel=makeTagSelect(['固定','偶爾','季付','年付','自訂'],'自訂');div.appendChild(sel);var btn=document.createElement('button');btn.className='del-btn';btn.innerHTML='&#x2715;';btn.onclick=function(){removeRow(this,'pay-list')};div.appendChild(btn);document.getElementById('pay-list').appendChild(div);payIdx++;calc();}
function calc(){var cash=Math.max(0,parseFloat(document.getElementById('cash').value)||0);var income=getIncome(),payable=getPayable(),saving=Math.max(0,parseFloat(document.getElementById('saving').value)||0);var total=cash+income,avail=Math.max(0,total-payable-saving),denom=Math.max(1,total);document.getElementById('m-cash').textContent=fmt(cash);document.getElementById('m-income').textContent=fmt(income);document.getElementById('m-pay').textContent=fmt(payable);document.getElementById('m-avail').textContent=fmt(avail);document.getElementById('sv-avail').textContent=fmt(avail);document.getElementById('sp-avail').textContent=Math.round(avail/denom*100)+'%';document.getElementById('sv-pay').textContent=fmt(payable);document.getElementById('sp-pay').textContent=Math.round(payable/denom*100)+'%';document.getElementById('sv-save').textContent=fmt(saving);document.getElementById('sp-save').textContent=Math.round(saving/denom*100)+'%';var rows=document.querySelectorAll('#pay-list .row'),bd='';rows.forEach(function(r){var n=r.querySelector('.row-label span'),v=parseFloat(r.querySelector('input').value)||0,sel=r.querySelector('select');if(v>0)bd+='<div class="brow"><span>'+(n?n.textContent:'項目')+(sel?' <span style="font-size:10px;color:#6b7280">['+sel.value+']</span>':'')+'</span><span>'+fmt(v)+'</span></div>';});bd+='<div class="brow total"><span>合計</span><span>'+fmt(payable)+'</span></div>';document.getElementById('pay-breakdown').innerHTML=bd;var ap=avail/denom,sb=document.getElementById('status-bar');if(avail<=0){sb.textContent='⚠️ 扣除代繳款與儲蓄後已無可動現金';sb.style.color='#A32D2D';}else if(ap<0.15){sb.textContent='可動現金偏低，建議減少支出';sb.style.color='#993C1D';}else if(ap<0.3){sb.textContent='財務稍緊，留意代繳款比例';sb.style.color='#854F0B';}else{sb.textContent='財務健康，繼續保持 👍';sb.style.color='#3B6D11';}drawSoil(document.getElementById('cSoil'),payable/denom);drawPlant(document.getElementById('cPlant'),saving/denom);}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function saveSnap(){var name=document.getElementById('snap-name').value.trim()||'紀錄 '+new Date().toLocaleDateString('zh-TW');var cash=Math.max(0,parseFloat(document.getElementById('cash').value)||0);var income=getIncome(),payable=getPayable(),saving=Math.max(0,parseFloat(document.getElementById('saving').value)||0);var avail=Math.max(0,cash+income-payable-saving);var incItems=[],payItems=[];document.querySelectorAll('#income-list .row').forEach(function(r){var lbl=r.querySelector('span.editable'),inp=r.querySelector('input'),sel=r.querySelector('select');if(lbl&&inp)incItems.push({name:lbl.textContent,val:parseFloat(inp.value)||0,tag:sel?sel.value:''});});document.querySelectorAll('#pay-list .row').forEach(function(r){var lbl=r.querySelector('.row-label span'),inp=r.querySelector('input'),sel=r.querySelector('select');if(lbl&&inp)payItems.push({name:lbl.textContent,val:parseFloat(inp.value)||0,tag:sel?sel.value:''});});var snap={id:Date.now(),name:name,date:new Date().toLocaleDateString('zh-TW'),cash:cash,income:income,payable:payable,saving:saving,avail:avail,incItems:incItems,payItems:payItems};var a=getAccum();a.totalCash+=cash;a.totalSave+=saving;saveAccum(a);var arr=getHistory();arr.unshift(snap);if(arr.length>50)arr=arr.slice(0,50);saveHistory(arr);updateAccumUI();showToast('已儲存「'+name+'」，累計已更新');document.getElementById('snap-name').value='';}
function deleteSnap(id){var arr=getHistory(),snap=arr.find(function(s){return s.id===id;});if(snap){var a=getAccum();a.totalCash=Math.max(0,a.totalCash-(snap.cash||0));a.totalSave=Math.max(0,a.totalSave-(snap.saving||0));saveAccum(a);}saveHistory(arr.filter(function(s){return s.id!==id;}));updateAccumUI();renderHistory();}
function loadSnap(s){document.getElementById('cash').value=s.cash||0;var il=document.getElementById('income-list');il.innerHTML='';(s.incItems||[]).forEach(function(it){var div=document.createElement('div');div.className='row';var sp=document.createElement('span');sp.contentEditable=true;sp.className='editable';sp.textContent=it.name;var inp=document.createElement('input');inp.type='number';inp.value=it.val;inp.min=0;inp.step=500;inp.oninput=calc;var sel=makeTagSelect(['接案','外包','顧問','教學','其他'],it.tag||'接案');var btn=document.createElement('button');btn.className='del-btn';btn.innerHTML='&#x2715;';btn.onclick=function(){removeRow(this,'income-list')};div.appendChild(sp);div.appendChild(inp);div.appendChild(sel);div.appendChild(btn);il.appendChild(div);});var pl=document.getElementById('pay-list');pl.innerHTML='';(s.payItems||[]).forEach(function(it){var div=document.createElement('div');div.className='row';var ld=document.createElement('div');ld.className='row-label';ld.innerHTML='<i class="ti ti-dots" style="font-size:13px"></i>';var sp=document.createElement('span');sp.contentEditable=true;sp.className='editable';sp.style.minWidth='36px';sp.textContent=it.name;ld.appendChild(sp);div.appendChild(ld);var inp=document.createElement('input');inp.type='number';inp.value=it.val;inp.min=0;inp.step=100;inp.oninput=calc;div.appendChild(inp);var sel=makeTagSelect(['固定','偶爾','季付','年付','自訂'],it.tag||'固定');div.appendChild(sel);var btn=document.createElement('button');btn.className='del-btn';btn.innerHTML='&#x2715;';btn.onclick=function(){removeRow(this,'pay-list')};div.appendChild(btn);pl.appendChild(div);});document.getElementById('saving').value=s.saving||0;calc();switchTab('input');showToast('已載入「'+s.name+'」');}
function renderHistory(){var el=document.getElementById('hist-content'),arr=getHistory();if(arr.length===0){el.innerHTML='<div class="empty-msg"><i class="ti ti-clock" style="font-size:28px;display:block;margin:0 auto 10px"></i>還沒有歷史紀錄</div>';return;}el.innerHTML='';arr.forEach(function(s,idx){var prev=arr[idx+1],cashDelta=prev?s.cash-(prev.cash||0):null,saveDelta=prev?s.saving-(prev.saving||0):null;var div=document.createElement('div');div.className='hist-item';div.innerHTML='<div style="font-size:14px;font-weight:500">'+s.name+'</div><div style="font-size:12px;color:#6b7280;margin-top:2px">'+s.date+'</div><div class="hist-nums"><div class="hist-num"><div class="hl">手上現金</div><div class="hv" style="color:#185FA5">'+fmt(s.cash||0)+'</div>'+(cashDelta!==null?'<div style="font-size:10px">'+fmtDelta(cashDelta)+'</div>':'')+'</div><div class="hist-num"><div class="hl">本期儲蓄</div><div class="hv" style="color:#3B6D11">'+fmt(s.saving||0)+'</div>'+(saveDelta!==null?'<div style="font-size:10px">'+fmtDelta(saveDelta)+'</div>':'')+'</div><div class="hist-num"><div class="hl">可動現金</div><div class="hv" style="color:#854F0B">'+fmt(s.avail)+'</div></div></div><div class="hist-actions"><button onclick=\'loadSnap('+JSON.stringify(s).replace(/\'/g,"\\'")+')\'><i class="ti ti-upload" style="font-size:12px"></i> 載入</button><button class="del-act" onclick="deleteSnap('+s.id+')"><i class="ti ti-trash" style="font-size:12px"></i> 刪除</button></div>';el.appendChild(div);});}
function drawWater(canvas,pct,t){var ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);var fillH=Math.round(h*Math.max(0,Math.min(1,pct))),baseY=h-fillH;ctx.fillStyle='#dff0fa';ctx.beginPath();ctx.roundRect(0,0,w,h,8);ctx.fill();ctx.save();ctx.beginPath();ctx.roundRect(0,0,w,h,8);ctx.clip();ctx.fillStyle='#378ADD';ctx.beginPath();ctx.moveTo(0,baseY);for(var x=0;x<=w;x+=3)ctx.lineTo(x,baseY+Math.sin((x/w)*Math.PI*4+t)*5+Math.sin((x/w)*Math.PI*2.3+t*1.3)*3);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.moveTo(0,baseY+2);for(var x=0;x<=w;x+=3)ctx.lineTo(x,baseY+2+Math.sin((x/w)*Math.PI*4+t+1)*3);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();ctx.fillStyle='#0C447C';ctx.font='500 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(Math.round(pct*100)+'%',w/2,h/2);ctx.restore();ctx.strokeStyle='#85B7EB';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(0,0,w,h,8);ctx.stroke();}
function drawSoil(canvas,pct){var ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);var fillH=Math.round(h*Math.max(0,Math.min(1,pct))),baseY=h-fillH;ctx.fillStyle='#f5ede0';ctx.beginPath();ctx.roundRect(0,0,w,h,8);ctx.fill();ctx.save();ctx.beginPath();ctx.roundRect(0,0,w,h,8);ctx.clip();if(fillH>0){ctx.fillStyle='#8B5E3C';ctx.fillRect(0,baseY,w,fillH);for(var i=0;i<70;i++){var px=Math.random()*w,py=baseY+Math.random()*fillH;ctx.fillStyle=Math.random()>.5?'rgba(60,30,10,.22)':'rgba(180,120,60,.28)';ctx.beginPath();ctx.ellipse(px,py,Math.random()*3+1,Math.random()*1.5+.5,0,0,Math.PI*2);ctx.fill();}}ctx.fillStyle='#412402';ctx.font='500 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(Math.round(pct*100)+'%',w/2,fillH>20?baseY+fillH/2:h/2);ctx.restore();ctx.strokeStyle='#EF9F27';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(0,0,w,h,8);ctx.stroke();}
function drawPlant(canvas,pct){var ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);var p=Math.max(0,Math.min(1,pct));ctx.fillStyle='#EAF3DE';ctx.beginPath();ctx.roundRect(0,0,w,h,8);ctx.fill();ctx.save();ctx.beginPath();ctx.roundRect(0,0,w,h,8);ctx.clip();var groundY=h-24;ctx.fillStyle='#7a5230';ctx.fillRect(0,groundY,w,24);var stemH=Math.round((h-48)*p),stemX=w/2,stemTopY=groundY-stemH;if(stemH>0){ctx.strokeStyle='#3B6D11';ctx.lineWidth=4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(stemX,groundY);ctx.quadraticCurveTo(stemX+Math.sin(stemH*.05)*10,(groundY+stemTopY)/2,stemX,stemTopY);ctx.stroke();}if(p>.2&&stemH>16){var ly=stemTopY+stemH*.6;ctx.fillStyle='#639922';ctx.save();ctx.translate(stemX,ly);ctx.rotate(-.5);ctx.beginPath();ctx.ellipse(-14,0,16,7,.3,0,Math.PI*2);ctx.fill();ctx.restore();ctx.save();ctx.translate(stemX,ly);ctx.rotate(.5);ctx.beginPath();ctx.ellipse(14,0,16,7,-.3,0,Math.PI*2);ctx.fill();ctx.restore();}if(p>.5&&stemH>45){var ly2=stemTopY+stemH*.3;ctx.fillStyle='#3B6D11';ctx.save();ctx.translate(stemX,ly2);ctx.rotate(-.6);ctx.beginPath();ctx.ellipse(-18,0,20,9,.2,0,Math.PI*2);ctx.fill();ctx.restore();ctx.save();ctx.translate(stemX,ly2);ctx.rotate(.6);ctx.beginPath();ctx.ellipse(18,0,20,9,-.2,0,Math.PI*2);ctx.fill();ctx.restore();}if(p>.75&&stemH>70){var r=Math.round(20*p);ctx.fillStyle='#5DCAA5';ctx.beginPath();ctx.arc(stemX,stemTopY,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#3B6D11';ctx.beginPath();ctx.arc(stemX,stemTopY,r*.6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FAC775';ctx.beginPath();ctx.arc(stemX,stemTopY,r*.22,0,Math.PI*2);ctx.fill();}else if(stemH>0){ctx.fillStyle='#97C459';ctx.beginPath();ctx.arc(stemX,stemTopY,8*p+4,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#27500A';ctx.font='500 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(Math.round(p*100)+'%',w/2,groundY-9);ctx.restore();ctx.strokeStyle='#97C459';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(0,0,w,h,8);ctx.stroke();}
function loop(){waveT+=0.04;var cash=Math.max(0,parseFloat(document.getElementById('cash').value)||0);var income=getIncome(),payable=getPayable(),saving=Math.max(0,parseFloat(document.getElementById('saving').value)||0);drawWater(document.getElementById('cWater'),Math.max(0,cash+income-payable-saving)/Math.max(1,cash+income),waveT);requestAnimationFrame(loop);}
document.querySelectorAll('.tag-select').forEach(function(s){styleTag(s);});
updateAccumUI();calc();loop();
</script>
</body>
